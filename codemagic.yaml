workflows:
  react-native-app:
    name: React Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        NODE_VERSION: 16
        DB_HOST: localhost
        DB_PORT: 3306
        DB_USER: foodprint_user
        DB_PASSWORD: securepassword
        DB_NAME: foodprint
      flutter: stable
    scripts:
      - name: Set up Node.js
        script: |
          echo "Using Node.js version:"
          nvm install $NODE_VERSION
          nvm use $NODE_VERSION
          node -v
          npm -v

      - name: Install MySQL
        script: |
          echo "Installing MySQL..."
          brew install mysql
          mysql.server start
          sleep 10  # Give MySQL time to start

      - name: Configure MySQL
        script: |
          echo "Configuring MySQL..."
          mysql -e "CREATE DATABASE $DB_NAME;" -u root
          mysql -e "CREATE USER '$DB_USER'@'localhost' IDENTIFIED BY '$DB_PASSWORD';" -u root
          mysql -e "GRANT ALL PRIVILEGES ON $DB_NAME.* TO '$DB_USER'@'localhost';" -u root
          mysql -e "FLUSH PRIVILEGES;" -u root

      - name: Debug Database Connection
        script: |
          echo "Testing MySQL connection..."
          mysql -u$DB_USER -p$DB_PASSWORD -e "SHOW DATABASES;" || echo "❌ Database connection failed!"

      - name: Install dependencies
        script: |
          npm install
          npm install -g sequelize-cli

      - name: Run Migrations
        script: |
          echo "Running database migrations..."
          npx sequelize db:migrate --config config/db/dbconfig.js || echo "❌ Migration failed!"

      - name: Build the app
        script: |
          npm run build

    artifacts:
      - build/**/*
