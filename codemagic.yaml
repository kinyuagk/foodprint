workflows:
  react-native-app:
    name: React Native Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        NODE_VERSION: 16
      flutter: stable
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build the app
        script: |
          npm run build
    artifacts:
      - build/**/*
